syntax = "proto3";

package percona.platform.org.v1;

option go_package = "/org;orgv1";

import "github.com/mwitkow/go-proto-validators/validator.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// OrgAPI provides API for organization management for Percona services.
service OrgAPI {
    // CreateOrganization creates new organization with the given name and adds the user as org admin.
    rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
      option (google.api.http) = {
        post: "/v1/org/Create"
        body: "*"
      };
    }

    // GetOrganizationByID fetches organization details for the given organization ID.
    rpc GetOrganizationByID(GetOrganizationByIDRequest) returns (GetOrganizationByIDResponse) {
      option (google.api.http) = {
        post: "/v1/org/GetOrganizationByID"
        body: "*"
      };
    }

    // GetOrganizationByUser fetches organizations that the logged in user has permission to view.
    rpc GetOrganizationByUser(GetOrganizationByUserRequest) returns (GetOrganizationByUserResponse) {
      option (google.api.http) = {
        post: "/v1/org/GetOrganizationByUser"
        body: "*"
      };
    }

    // DeleteOrganization deletes organization and its members for the given organization ID.
    rpc DeleteOrganization(DeleteOrganizationRequest) returns (DeleteOrganizationResponse) {
      option (google.api.http) = {
        post: "/v1/org/Delete"
        body: "*"
      };
    }
}

message CreateOrganizationRequest {
    // Organization name.
    string name = 1 [
    (validator.field) = {
      string_not_empty: true
    }
  ];
}

message CreateOrganizationResponse {
    // Perona Portal Organization ID.
    string id = 1;
    // Percona Portal Organization Name.
    string name = 2;
    // Timestamp of organization creation.
    google.protobuf.Timestamp created_at = 3;
    // Timestamp when organization was last updated.
    google.protobuf.Timestamp updated_at = 4;
}

message GetOrganizationByIDRequest {
  // Perona Portal Organization ID.
  string id = 1 [
  (validator.field) = {
    string_not_empty: true
  }
];
}

message GetOrganizationByIDResponse {
    // Perona Portal Organization ID.
    string id = 1;
    // Percona Portal Organization Name.
    string name = 2;
    // Timestamp of organization creation.
    google.protobuf.Timestamp created_at = 3;
    // Timestamp when organization was last updated.
    google.protobuf.Timestamp updated_at = 4;
}


message Organization {
  // Perona Portal Organization ID.
  string id = 1;
  // Percona Portal Organization Name.
  string name = 2;
  // Timestamp of organization creation.
  google.protobuf.Timestamp created_at = 3;
  // Timestamp when organization was last updated.
  google.protobuf.Timestamp updated_at = 4;
}

message GetOrganizationByUserRequest {}

message GetOrganizationByUserResponse {
  repeated Organization organizations = 1;
}

message DeleteOrganizationRequest {
  // Perona Portal Organization ID.
  string id = 1 [
  (validator.field) = {
    string_not_empty: true
  }
];
}

message DeleteOrganizationResponse {}

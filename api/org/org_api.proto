syntax = "proto3";

package percona.platform.org.v1;

option go_package = "/org;orgv1";

import "github.com/mwitkow/go-proto-validators/validator.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

// OrgAPI provides API for organization management for Percona services.
service OrgAPI {
    // CreateOrganization creates new organization with the given name and adds the user as org admin.
    rpc CreateOrganization(CreateOrganizationRequest) returns (CreateOrganizationResponse) {
      option (google.api.http) = {
        post: "/v1/org/Create"
        body: "*"
      };
    }

    // GetOrganization fetches organization details for the given organization ID.
    rpc GetOrganization(GetOrganizationRequest) returns (GetOrganizationResponse) {
      option (google.api.http) = {
        post: "/v1/org/Get"
        body: "*"
      };
    }

    // GetOrganizationByUser fetches organization IDs that the logged in user is a member of.
    rpc GetOrganizationByUser(GetOrganizationByUserRequest) returns (GetOrganizationByUserResponse) {
      option (google.api.http) = {
        post: "/v1/org/GetOrganizationByUser"
        body: "*"
      };
    }

    // InviteMember invites users to a Percona Platform Organization.
    rpc InviteMember(InviteMemberRequest) returns (InviteMemberResponse) {
      option (google.api.http) = {
        post: "/v1/org/InviteMember"
        body: "*"
      };
    }

    // ListMembers invites users to a Percona Platform Organization.
    rpc ListMembers(ListMembersRequest) returns (ListMembersResponse) {
      option (google.api.http) = {
        post: "/v1/org/ListMembers"
        body: "*"
      };
    }
}

message CreateOrganizationRequest {
    // Organization name.
    string name = 1 [
    (validator.field) = {
      string_not_empty: true
    }
  ];
}

message CreateOrganizationResponse {
    // Organization UUID.
    string org_id = 1;
}

message GetOrganizationRequest {
  // Organization UUID.
  string org_id = 1 [
  (validator.field) = {
    string_not_empty: true
  }
];
}

message GetOrganizationResponse {
  // Organization name.
  string name = 1;
  // Organization's time of creation.
  google.protobuf.Timestamp created_at = 2;
}

message GetOrganizationByUserRequest {}

message GetOrganizationByUserResponse {
  repeated string org_ids = 1;
}

enum OrganizationMemberRole {
  ORGANIZATION_MEMBER_ROLE_INVALID = 0;

  ADMIN = 1;

  TECHNICAL = 2;
}

message InviteMemberRequest {
  string email = 1;

  OrganizationMemberRole role = 2;
}

message InviteMemberResponse {}

message ListMembersRequest {}

message ListMembersResponse {
  string email = 1;

  string name = 2;

  OrganizationMemberRole role = 3;
}
---
linters-settings:
  depguard:
    list-type: blacklist
    include-go-root: true
    packages:
        # use "github.com/pkg/errors" instead
        - errors
        # use "github.com/golang/protobuf/proto" instead
        - github.com/gogo/protobuf/proto

  goimports:
    local-prefixes: github.com/percona-platform/platform

  lll:
    line-length: 120
    tab-width: 4

  unused:
    check-exported: true

  unparam:
    check-exported: true

linters:
  enable-all: true
  disable:
    - mnd  # too annoying
    - wsl  # too annoying

issues:
  exclude-use-default: false

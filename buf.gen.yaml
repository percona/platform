version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/percona-platform/platform/gen
    except:
      - buf.build/googleapis/googleapis
plugins:
  - name: go
    out: gen
    opt:
      - paths=source_relative
  - name: go-grpc
    out: gen
    opt:
      - paths=source_relative
  - name: grpc-gateway
    out: gen
    opt:
      - paths=source_relative
  - name: govalidators
    out: gen
    opt:
      - paths=source_relative
      - lang=go
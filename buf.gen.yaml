version: v1
managed:
  enabled: true
  go_package_prefix:
    default: github.com/percona-platform/platform/gen
    except:
      - buf.build/googleapis/googleapis
plugins:
  - name: gen-validate
    out: gen
    opt:
      - lang=go
      - paths=source_relative
    path: bin/protoc-gen-validate
  - name: go
    out: gen
    opt:
      - paths=source_relative
    path: bin/protoc-gen-go
  - name: go-grpc
    out: gen
    opt:
      - paths=source_relative
    path: bin/protoc-gen-go-grpc
  - name: grpc-gateway
    out: gen
    opt:
      - paths=source_relative
    path: bin/protoc-gen-grpc-gateway

---
# DO NOT EDIT this file in a service repository.
# It should be changed in the `template` repository, and then copied to there as-is.
# All differences should be encapsulated in Makefile targets.

name: Clean
on:
  workflow_dispatch:
  schedule:
    # run every Saturday
    - cron: "0 12 * * 6"

jobs:
  clean-packages:
    name: Clean stale packages
    timeout-minutes: 10
    runs-on: ubuntu-20.04

    steps:
      - name: Collect stale package versions
        env:
          ROBOT_TOKEN: ${{ secrets.ROBOT_TOKEN }}
        uses: percona/gh-action-get-stale-packages-action@v1

      - name: Clean stale packages
        if: env.STALE_VERSIONS
        uses: actions/delete-package-versions@v1
        with:
          package-version-ids: ${{ env.STALE_VERSIONS }}

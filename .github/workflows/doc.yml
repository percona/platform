name: Sync OAS to ReadMe
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Org API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/org/org_api.swagger.json --id=orgapi --key=${{ secrets.README_TOKEN }}

      - name: Sync Auth API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/auth/auth_api.swagger.json --id=authapi --key=${{ secrets.README_TOKEN }}

      - name: Sync Check Retrieval API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/check/retrieval/retrieval_api.swagger.json --id=retrievalapi --key=${{ secrets.README_TOKEN }}

      - name: Sync Telemetry Reporter API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/telemetry/reporter/reporter_api.swagger.json --id=reporterapi --key=${{ secrets.README_TOKEN }}

      - name: Install NodeJS
        uses: percona-platform/setup-node@v2
        with:
          node-version: "14"

      - name: Install dependencies
        run: npm install -g rdme

      - name: Sync the folder with *.md files to Readme
        run: rdme docs markdown --version=v1.0 --key=${{ secrets.README_TOKEN }}

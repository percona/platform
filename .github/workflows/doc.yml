name: Sync OAS to ReadMe
on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  runs-on: ubuntu-latest
  sync:
    steps:
      - name: Sync Org API docs
        uses: percona-platform/checkout@v2
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}
          oas-file-path: "./gen/org/org_api.swagger.json"
          api-version: "v1.0"
      - name: Sync Auth API docs
        uses: percona-platform/checkout@v2
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}
          oas-file-path: "./gen/auth/auth_api.swagger.json"
          api-version: "v1.0"
      - name: Sync Check Retrieval API docs
        uses: percona-platform/checkout@v2
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}
          oas-file-path: "./gen/check/retrieval/retrieval_api.swagger.json"
          api-version: "v1.0"
      - name: Sync Telemetry Reporter API docs
        uses: percona-platform/checkout@v2
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}
          oas-file-path: "./gen/telemetry/reporter/reporter_api.swagger.json"
          api-version: "v1.0"

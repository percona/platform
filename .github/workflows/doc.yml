name: Sync OAS to ReadMe
on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: percona-platform/checkout@v2

      - name: Sync Org API
        uses: percona-platform/rdme@7.0.0
        with:
          rdme: openapi ./gen/org/org_api.swagger.json --id=61b8821d25989c0010a34938 --key=${{ secrets.README_TOKEN }}
        # uses: percona-platform/github-readme-sync@v2
        # with:
        #   readme-oas-key: ${{ secrets.README_TOKEN }}:61b8821d25989c0010a34938
        #   oas-file-path: ./gen/org/org_api.swagger.json
        #   api-version: "v1.0.0"

      - name: Sync Auth API
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}:6230a5e21b6a79029641026f
          oas-file-path: ./gen/auth/auth_api.swagger.json
          api-version: "v1.0.0"

      - name: Sync Check Retrieval API
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}:6231a58f3c2121030871d47e
          oas-file-path: ./gen/check/retrieval/retrieval_api.swagger.json
          api-version: "v1.0.0"

      - name: Sync Telemetry Reporter API
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}:6231a6332b447a002e8da843
          oas-file-path: ./gen/telemetry/reporter/reporter_api.swagger.json
          api-version: "v1.0.0"

      - name: Sync the folder with *.md files to Readme
        uses: percona-platform/rdme@7.0.0
        with:
          rdme: docs markdown --version=v1.0 --key=${{ secrets.README_TOKEN }}

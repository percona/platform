name: Sync OAS to ReadMe
on:
  push:
    branches:
      - main
  pull_request:

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: percona-platform/checkout@v2

      - name: Sync Org API
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}:orgapi
          oas-file-path: ./gen/org/org_api.swagger.json
          api-version: "v1.0.0"

      - name: Sync Auth API
        uses: percona-platform/github-readme-sync@v2
        with:
          readme-oas-key: ${{ secrets.README_TOKEN }}:authapi
          oas-file-path: ./gen/auth/auth_api.swagger.json
          api-version: "v1.0.0"

      - name: Sync Check Retrieval API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/check/retrieval/retrieval_api.swagger.json --id=retrievalapi --key=${{ secrets.README_TOKEN }}

      - name: Sync Telemetry Reporter API
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: openapi ./gen/telemetry/reporter/reporter_api.swagger.json --id=reporterapi --key=${{ secrets.README_TOKEN }}

      - name: Install NodeJS
        uses: percona-platform/setup-node@v2
        with:
          node-version: "16"

      - name: Install dependencies
        run: npm install -g rdme

      - name: Sync the folder with *.md files to Readme
        uses: percona-platform/rdme@6.5.0
        with:
          rdme: docs markdown --version=v1.0 --key=${{ secrets.README_TOKEN }}

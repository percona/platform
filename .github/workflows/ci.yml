---
name: CI
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  gen:
    name: Generate

    strategy:
      matrix:
        go-version: [1.14.x]
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}

    env:
      GOPRIVATE: github.com/percona-platform
      GOFLAGS: -v -mod=readonly

    steps:
      - name: Set up Go ${{ matrix.go-version }}
        uses: percona-platform/setup-go@v1
        with:
          go-version: ${{ matrix.go-version }}

      - name: Check out code into the Go module directory
        uses: percona-platform/checkout@v2
        with:
          lfs: true

      # useful debug commands
      # - run: env
      # - run: go env
      # - run: pwd

      - name: Enable Go modules cache
        uses: percona-platform/cache@v1
        with:
          path: ~/go/pkg/mod
          key: ${{ matrix.platform }}-go-${{ matrix.go-version }}-modules-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ matrix.platform }}-go-${{ matrix.go-version }}-modules-

      - name: Enable Go build cache
        uses: percona-platform/cache@v1
        with:
          path: ~/.cache/go-build
          key: ${{ matrix.platform }}-go-${{ matrix.go-version }}-build-${{ github.ref }}-${{ hashFiles('**') }}
          restore-keys: |
            ${{ matrix.platform }}-go-${{ matrix.go-version }}-build-${{ github.ref }}-
            ${{ matrix.platform }}-go-${{ matrix.go-version }}-build-

      - name: Enable experimental Docker features for --squash flag
        run: sudo .github/workflows/enable-docker-experimental.sh

      - name: Login in Docker registry
        run: docker login -u $GITHUB_ACTOR -p ${{ secrets.GITHUB_TOKEN }} docker.pkg.github.com

      - name: Download Go modules
        run: go mod download

      - name: Run CI target
        run: make ci

  build:
    name: Build Docker image
    timeout-minutes: 5
    needs: gen
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    env:
      GOPRIVATE: github.com/percona-platform
      GOFLAGS: -v -mod=readonly

    steps:
      - name: Check out code into the Go module directory
        uses: percona-platform/checkout@v2
        with:
          lfs: true

      - name: Enable experimental Docker features for --squash flag
        run: sudo .github/workflows/enable-docker-experimental.sh

      - name: Login in Docker registry
        run: docker login -u $GITHUB_ACTOR -p ${{ secrets.GITHUB_TOKEN }} docker.pkg.github.com

      - name: Build Docker image
        run: make docker-build

      - name: Tag and push Docker image
        run: make docker-push
